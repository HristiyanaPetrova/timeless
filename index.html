<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEM Център</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #00d4ff;
        }
        #timer { font-size: 3rem; font-weight: bold; color: #00d4ff; margin: 20px 0; }
        .event-item {
            background: rgba(255,255,255,0.05);
            margin: 5px 0;
            padding: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
        }
        .active { background: #3a5ba0 !important; border: 1px solid #5eead4; }
        .past { opacity: 0.3; }
    </style>
</head>
<body>

    <h1>🚀 STEM ЦЕНТЪР 🚀</h1>
    
    <div class="container">
        <div id="status">Зареждане...</div>
        <div id="current-name" style="font-size: 1.2rem; font-weight: bold; color: #5eead4;">Моля, изчакайте...</div>
        <div id="timer">00:00:00</div>
    </div>

    <div id="schedule" style="width:100%; max-width:500px; margin-top:20px;"></div>

    <script>
        const program = [
            { t: "2026-04-27T13:30:00", n: "Тържествено посрещане", l: "Фоайе" },
            { t: "2026-04-27T13:40:00", n: "Експерименти (Химия и Биол.)", l: "Етаж 2" },
            { t: "2026-04-27T13:50:00", n: "Математическа пекарна", l: "Етаж 3" },
            { t: "2026-04-27T14:00:00", n: "Официално откриване", l: "Етаж 4" },
            { t: "2026-04-27T14:20:00", n: "Зона Математика", l: "Етаж 4" },
            { t: "2026-04-27T14:30:00", n: "Зона Биология", l: "Етаж 4" },
            { t: "2026-04-27T14:40:00", n: "Зона Химия", l: "Етаж 4" },
            { t: "2026-04-27T14:50:00", n: "Урок Физика 360°", l: "Етаж 4" },
            { t: "2026-04-27T15:30:00", n: "Коктейл", l: "Етаж 2" }
        ];

        function update() {
            try {
                const now = new Date().getTime();
                const schedDiv = document.getElementById('schedule');
                let html = '';
                let currentIdx = -1;

                program.forEach((ev, i) => {
                    const start = new Date(ev.t).getTime();
                    if (now >= start) currentIdx = i;
                    
                    let cls = 'event-item';
                    if (now >= start) cls += ' past';
                    html += `<div class="${cls}" id="i${i}"><span>${ev.t.split('T')[1].substring(0,5)} - ${ev.n}</span><span>${ev.l}</span></div>`;
                });
                schedDiv.innerHTML = html;

                if (currentIdx !== -1) {
                    const activeRow = document.getElementById('i' + currentIdx);
                    if (activeRow) activeRow.className = 'event-item active';
                }

                const timer = document.getElementById('timer');
                const status = document.getElementById('status');
                const cName = document.getElementById('current-name');

                if (currentIdx === -1) {
                    status.innerText = "До началото остават:";
                    cName.innerText = program[0].n;
                    const diff = new Date(program[0].t).getTime() - now;
                    timer.innerText = fmt(diff);
                } else if (currentIdx < program.length - 1) {
                    status.innerText = "В МОМЕНТА:";
                    cName.innerText = program[currentIdx].n;
                    const diff = new Date(program[currentIdx+1].t).getTime() - now;
                    timer.innerText = fmt(diff);
                } else {
                    status.innerText = "Събитието приключи";
                    cName.innerText = "Благодарим ви!";
                    timer.innerText = "ФИНАЛ";
                }
            } catch (e) { console.error(e); }
        }

        function fmt(ms) {
            const h = Math.floor(ms / 3600000);
            const m = Math.floor((ms % 3600000) / 60000);
            const s = Math.floor((ms % 60000) / 1000);
            return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        // Най-сигурният начин за стартиране
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
