<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEM Център - ОУ "Св. Патриарх Евтимий"</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-blue: #1a2a5a;
            --highlight: #00d4ff;
            --success: #5eead4;
            --white: #ffffff;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(0, 212, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 212, 255, 0); }
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: var(--white);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--highlight);
        }

        .status-container {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 650px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .label-top {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .current-event-name {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--success);
            margin-bottom: 5px;
            display: block;
        }

        .current-location {
            font-size: 1.1rem;
            color: var(--highlight);
            margin-bottom: 20px;
            display: block;
        }

        .main-timer {
            font-size: 4rem;
            font-weight: 700;
            color: var(--white);
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.6);
            font-variant-numeric: tabular-nums;
            margin: 10px 0;
        }

        .next-event-preview {
            font-size: 0.95rem;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            opacity: 0.9;
        }

        .schedule {
            margin-top: 40px;
            width: 90%;
            max-width: 650px;
        }

        .event-item {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            transition: 0.3s;
        }

        .active {
            animation: pulse 2s infinite;
            background: rgba(0, 212, 255, 0.2) !important;
            border: 1px solid var(--highlight);
        }

        .past { opacity: 0.3; filter: grayscale(1); }

        .time-tag { color: var(--highlight); font-weight: bold; margin-right: 15px; }
        .loc-tag { opacity: 0.6; font-size: 0.85rem; }

        @media (max-width: 480px) {
            .main-timer { font-size: 3rem; }
            .current-event-name { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🚀 STEM ЦЕНТЪР 🚀</h1>
        <p>ОУ "Св. Патриарх Евтимий", В. Търново</p>
    </div>

    <div class="status-container">
        <div id="status-top-label" class="label-top">В МОМЕНТА</div>
        <div id="current-name" class="current-event-name">Зареждане...</div>
        <div id="current-loc" class="current-location">Моля, изчакайте</div>
        
        <div id="status-timer-label" class="label-top" style="font-size: 0.8rem;">Оставащо време до следващата част:</div>
        <div id="timer" class="main-timer">00:00:00</div>
        
        <div id="next-preview" class="next-event-preview"></div>
    </div>

    <div class="schedule" id="schedule-list"></div>

    <script>
        const program = [
            { time: "2026-04-27T13:30:00", label: "Тържествено посрещане", loc: "Фоайе, главен вход" },
            { time: "2026-04-27T13:40:00", label: "Експерименти и симулации", loc: "Етаж 2" },
            { time: "2026-04-27T13:50:00", label: "Математическа пекарна", loc: "Етаж 3" },
            { time: "2026-04-27T14:00:00", label: "Официално откриване на STEM център", loc: "Етаж 4" },
            { time: "2026-04-27T14:20:00", label: "Представяне: Математика", loc: "Етаж 4" },
            { time: "2026-04-27T14:30:00", label: "Представяне: Биология", loc: "Етаж 4" },
            { time: "2026-04-27T14:40:00", label: "Представяне: Химия", loc: "Етаж 4" },
            { time: "2026-04-27T14:50:00", label: "Урок: Физика на 360 градуса", loc: "Етаж 4" },
            { time: "2026-04-27T15:30:00", label: "Коктейл", loc: "Етаж 2" }
        ];

        function updateUI() {
            const now = new Date().getTime();
            let currentIdx = -1;

            for (let i = 0; i < program.length; i++) {
                if (now >= new Date(program[i].time).getTime()) currentIdx = i;
            }

            // Обновяване на списъка
            const list = document.getElementById('schedule-list');
            list.innerHTML = '';
            program.forEach((ev, i) => {
                const item = document.createElement('div');
                item.className = `event-item ${i === currentIdx ? 'active' : ''} ${i < currentIdx ? 'past' : ''}`;
                item.innerHTML = `<div><span class="time-tag">${ev.time.split('T')[1].substring(0,5)}</span>${ev.label}</div><div class="loc-tag">${ev.loc}</div>`;
                list.appendChild(item);
            });

            // Логика за статус панела
            if (currentIdx === -1) {
                document.getElementById('status-top-label').innerText = "Очакваме началото";
                document.getElementById('current-name').innerText = "Добре дошли!";
                document.getElementById('current-loc').innerText = "Събитието започва в 13:30 ч.";
                showTimer(new Date(program[0].time).getTime() - now);
                document.getElementById('next-preview').innerText = "Следва: " + program[0].label;
            } else if (currentIdx < program.length - 1) {
                document.getElementById('status-top-label').innerText = "В МОМЕНТА";
                document.getElementById('current-name').innerText = program[currentIdx].label;
                document.getElementById('current-loc').innerText = "📍 " + program[currentIdx].loc;
                
                const diff = new Date(program[currentIdx+1].time).getTime() - now;
                showTimer(diff);
                document.getElementById('next-preview').innerHTML = `Следва в <b>${program[currentIdx+1].time.split('T')[1].substring(0,5)}</b>: ${program[currentIdx+1].label}`;
            } else {
                document.getElementById('status-top-label').innerText = "ФИНАЛ";
                document.getElementById('current-name').innerText = "Коктейл и свободна дискусия";
                document.getElementById('current-loc').innerText = "Етаж 2";
                document.getElementById('timer').innerText = "ГРАДИНА";
                document.getElementById('next-preview').innerText = "Благодарим ви за присъствието!";
            }
        }

        function showTimer(ms) {
            const h = Math.floor(ms / 3600000);
            const m = Math.floor((ms % 3600000) / 60000);
            const s = Math.floor((ms % 60000) / 1000);
            document.getElementById('timer').innerText = 
                `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        setInterval(updateUI, 1000);
        updateUI();
    </script>
</body>
</html>
