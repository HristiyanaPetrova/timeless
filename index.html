<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEM Център - ОУ "Св. Патриарх Евтимий"</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Цветове, вдъхновени директно от плаката */
            --dark-blue: #1a2a5a;
            --accent-blue: #3a5ba0;
            --white: #ffffff;
            --highlight: #00d4ff; /* Светещо синьо */
            --success: #5eead4; /* Светло зелено за статус */
        }

        /* Анимация за пулсиране на активната карта */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(0, 212, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 212, 255, 0); }
        }

        body {
            font-family: 'Montserrat', sans-serif;
            /* Космически фон с мек градиент */
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: var(--white);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* ДОПЪЛНИТЕЛНИ ЕЛЕМЕНТИ (Украса от плаката) */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 150px;
            height: 150px;
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0.1; /* Много лек фон */
            z-index: -1;
        }

        /* Атом в горния ляв ъгъл (като на плаката) */
        body::before {
            top: 50px;
            left: 50px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="10" fill="white"/><ellipse cx="50" cy="50" rx="40" ry="15" fill="none" stroke="white" stroke-width="2"/><ellipse cx="50" cy="50" rx="15" ry="40" fill="none" stroke="white" stroke-width="2"/></svg>');
        }

        /* Микроскоп в долния десен ъгъл (като на плаката) */
        body::after {
            bottom: 50px;
            right: 50px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect x="30" y="20" width="10" height="60" fill="white"/><circle cx="50" cy="50" r="20" fill="white"/><rect x="70" y="60" width="20" height="10" fill="white"/></svg>');
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--highlight);
            padding-bottom: 10px;
        }

        .header h1 { margin-bottom: 5px; }
        .header h3 { margin-top: 0; opacity: 0.9; }

        .main-timer {
            font-size: 3.5rem;
            font-weight: bold;
            color: var(--white); /* Таймерът е бял, статусът е светещ */
            text-shadow: 0 0 15px rgba(0, 212, 255, 0.5);
            margin: 15px 0;
            letter-spacing: 2px;
        }

        .status-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            width: 90%;
            max-width: 650px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .current-event-status {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .current-event-name {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--success); /* Светещо зелено за името на събитието */
            margin-bottom: 15px;
            display: block;
        }

        .next-event-info {
            font-size: 1.1rem;
            opacity: 0.8;
            margin-top: 20px;
            font-style: italic;
        }

        .schedule {
            margin-top: 40px;
            width: 90%;
            max-width: 650px;
        }

        .schedule-title {
            text-align: center;
            color: var(--highlight);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .event-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s ease;
            border-radius: 8px;
        }

        /* АКТИВНА КАРТА - с пулсиране и подчертаване */
        .active {
            animation: pulse 2s infinite;
            background: rgba(0, 212, 255, 0.25) !important;
            border-left: 5px solid var(--highlight);
            transform: scale(1.03);
            font-weight: bold;
        }

        .past {
            opacity: 0.3;
            text-decoration: line-through;
        }

        .event-time { font-weight: bold; color: var(--highlight); margin-right: 10px; }
        .event-loc { opacity: 0.7; font-size: 0.9rem; margin-left: auto; padding-left: 15px; text-align: right;}

        @media (max-width: 480px) {
            .main-timer { font-size: 2.5rem; }
            .current-event-name { font-size: 1.4rem; }
            .event-item { flex-direction: column; align-items: flex-start; text-align: left; }
            .event-loc { margin-left: 0; padding-left: 0; text-align: left; margin-top: 5px;}
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🚀 ОУ "Св. Патриарх Евтимий" 🚀</h1>
        <h3>Откриване на STEM Център - гр. Велико Търново</h3>
        <p>27 април 2026 г.</p>
    </div>

    <div class="status-container">
        <div id="status-label" class="current-event-status">До началото остават:</div>
        <div id="current-name" class="current-event-name">Официално посрещане</div>
        <div id="timer" class="main-timer">00:00:00</div>
        <div id="next-info" class="next-event-info">Подгответе се за старт!</div>
    </div>

    <div class="schedule">
        <h2 class="schedule-title">Програма на събитието</h2>
        <div id="schedule-list">
            </div>
    </div>

    <script>
        const program = [
            { time: "2026-04-27T13:30:00", label: "Тържествено посрещане", loc: "Фоайе, главен вход" },
            { time: "2026-04-27T13:40:00", label: "Експерименти и симулации (Химия и Биология)", loc: "Етаж 2" },
            { time: "2026-04-27T13:50:00", label: "Математическа пекарна", loc: "Етаж 3" },
            { time: "2026-04-27T14:00:00", label: "Официално откриване на STEM център", loc: "Етаж 4" },
            { time: "2026-04-27T14:20:00", label: "Представяне на кабинет по Математика", loc: "Етаж 4" },
            { time: "2026-04-27T14:30:00", label: "Представяне на кабинет по Биология", loc: "Етаж 4" },
            { time: "2026-04-27T14:40:00", label: "Представяне на кабинет по Химия", loc: "Етаж 4" },
            { time: "2026-04-27T14:50:00", label: "Открит урок: Физика на 360 градуса", loc: "Етаж 4" },
            { time: "2026-04-27T15:30:00", label: "Коктейл", loc: "Етаж 2" }
        ];

        function updateUI() {
            const now = new Date().getTime();
            const timerDisplay = document.getElementById('timer');
            const statusLabel = document.getElementById('status-label');
            const currentNameDisplay = document.getElementById('current-name');
            const nextInfo = document.getElementById('next-info');
            const scheduleList = document.getElementById('schedule-list');

            let currentIdx = -1;
            
            // Намиране на текущото събитие
            for (let i = 0; i < program.length; i++) {
                const eventTime = new Date(program[i].time).getTime();
                if (now >= eventTime) {
                    currentIdx = i;
                }
            }

            // Обновяване на списъка (визуално)
            scheduleList.innerHTML = '';
            program.forEach((event, index) => {
                const eventTime = new Date(event.time).getTime();
                const div = document.createElement('div');
                div.className = 'event-item';
                if (index === currentIdx) div.classList.add('active');
                if (index < currentIdx) div.classList.add('past');
                
                const timeStr = event.time.split('T')[1].substring(0, 5);
                div.innerHTML = `<span class="event-time">${timeStr} ч.</span> <span class="event-label">${event.label}</span> <span class="event-loc">📍 ${event.loc}</span>`;
                scheduleList.appendChild(div);
            });

            // Логика за статус панела
            let targetTime;
            if (currentIdx === -1) {
                // Преди събитието
                statusLabel.innerText = "До началото остават:";
                currentNameDisplay.innerText = program[0].label;
                targetTime = new Date(program[0].time).getTime();
                nextInfo.innerText = "📍 " + program[0].loc;
            } else if (currentIdx < program.length - 1) {
                // ПО ВРЕМЕ НА ПРОГРАМАТА
                statusLabel.innerText = "В МОМЕНТА";
                currentNameDisplay.innerText = program[currentIdx].label; // Показва името на събитието
                
                targetTime = new Date(program[currentIdx + 1].time).getTime(); // Брои до следващото
                nextInfo.innerHTML = `Следва в <b>${program[currentIdx+1].time.split('T')[1].substring(0,5)} ч.</b>: ${program[currentIdx+1].label}`;
            } else {
                // След последното събитие
                statusLabel.innerText = "Събитието приключи";
                currentNameDisplay.innerText = "Благодарим ви, че бяхте с нас!";
                timerDisplay.innerText = "--:--:--";
                nextInfo.innerText = "До нови срещи!";
                return;
            }

            const diff = targetTime - now;
            if (diff <= 0) { updateUI(); return; } // prevent negative values during update

            const hours = Math.floor(diff / (1000 * 60 * 60));
            const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const secs = Math.floor((diff % (1000 * 60)) / 1000);

            // Големият таймер показва оставащото време (до началото или до следващото събитие)
            timerDisplay.innerText = 
                `${hours.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        setInterval(updateUI, 1000);
        updateUI(); // Initial run
    </script>
</body>
</html>
