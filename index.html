<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEM Център - В. Търново</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --highlight: #00d4ff;
            --success: #5eead4;
            --white: #ffffff;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: var(--white);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            /* Първоначално крием всичко, за да няма премигване */
            opacity: 0;
            transition: opacity 0.5s ease-in;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { margin-bottom: 5px; font-size: 2rem; }

        .status-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px 20px;
            width: 90%;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 40px;
        }

        .status-label { text-transform: uppercase; letter-spacing: 2px; font-size: 0.9rem; opacity: 0.7; }
        .current-msg { font-size: 1.8rem; font-weight: bold; color: var(--success); margin: 15px 0; }
        
        #timer {
            font-size: 4.5rem;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            margin: 10px 0;
            font-variant-numeric: tabular-nums;
        }

        .next-info { font-size: 1rem; opacity: 0.6; margin-top: 15px; }

        .schedule { width: 90%; max-width: 600px; }
        .event-item {
            display: flex;
            justify-content: space-between;
            padding: 18px;
            margin-bottom: 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            transition: 0.3s;
        }

        .active {
            background: rgba(0, 212, 255, 0.15) !important;
            border: 1px solid var(--highlight);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }

        .past { opacity: 0.2; filter: grayscale(1); }
        .time-tag { color: var(--highlight); font-weight: bold; margin-right: 15px; }

        @media (max-width: 480px) {
            #timer { font-size: 3rem; }
            .current-msg { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🚀 STEM ЦЕНТЪР 🚀</h1>
        <div style="opacity: 0.8;">ОУ "Св. Патриарх Евтимий", гр. В. Търново</div>
        <div style="font-size: 0.9rem; margin-top: 5px;">27 април 2026 г.</div>
    </div>

    <div class="status-card">
        <div id="label-top" class="status-label">До началото остават:</div>
        <div id="current-name" class="current-msg">Зареждане...</div>
        <div id="timer">00:00:00</div>
        <div id="next-preview" class="next-info"></div>
    </div>

    <div class="schedule" id="schedule-list"></div>

    <script>
        const program = [
            { t: "2026-04-27T13:30:00", n: "Тържествено посрещане", l: "Фоайе" },
            { t: "2026-04-27T13:40:00", n: "Експерименти и симулации (Химия и Биол.)", l: "Етаж 2" },
            { t: "2026-04-27T13:50:00", n: "Математическа пекарна (Матемитаки и Физика)", l: "Етаж 3" },
            { t: "2026-04-27T14:00:00", n: "Официално откриване", l: "Етаж 4" },
            { t: "2026-04-27T14:20:00", n: "Зона за генериране на идеи и проучвания", l: "Етаж 4" },
            { t: "2026-04-27T14:30:00", n: "Креативна зона за анализ и моделиране", l: "Етаж 4" },
            { t: "2026-04-27T14:40:00", n: "Практическа и специална лаборатория", l: "Етаж 4" },
            { t: "2026-04-27T14:50:00", n: "Зона за симулации и експерименти. Урок: Физика на 360°", l: "Етаж 4" },
            { t: "2026-04-27T15:30:00", n: "Коктейл", l: "Етаж 2" }
        ];

        function update() {
            const now = new Date().getTime();
            let currentIdx = -1;

            // 1. Изчисляваме коя е текущата позиция
            program.forEach((ev, i) => {
                if (now >= new Date(ev.t).getTime()) currentIdx = i;
            });

            // 2. Обновяваме списъка
            const list = document.getElementById('schedule-list');
            list.innerHTML = program.map((ev, i) => {
                let cls = 'event-item';
                if (i === currentIdx) cls += ' active';
                if (i < currentIdx) cls += ' past';
                return `
                    <div class="${cls}">
                        <span><span class="time-tag">${ev.t.split('T')[1].substring(0,5)} ч.</span> ${ev.n}</span>
                        <span style="opacity:0.6; font-size:0.9rem;">${ev.l}</span>
                    </div>
                `;
            }).join('');

            // 3. Обновяваме голямата карта
            const label = document.getElementById('label-top');
            const name = document.getElementById('current-name');
            const timer = document.getElementById('timer');
            const next = document.getElementById('next-preview');

            if (currentIdx === -1) {
                label.innerText = "До началото остават:";
                name.innerText = "Очакваме Ви!";
                const diff = new Date(program[0].t).getTime() - now;
                timer.innerText = format(diff);
                next.innerText = "Първо събитие: " + program[0].n;
            } else if (currentIdx < program.length - 1) {
                label.innerText = "В МОМЕНТА:";
                name.innerText = program[currentIdx].n;
                const diff = new Date(program[currentIdx+1].t).getTime() - now;
                timer.innerText = format(diff);
                next.innerHTML = `Следва в <b>${program[currentIdx+1].t.split('T')[1].substring(0,5)}</b>: ${program[currentIdx+1].n}`;
            } else {
                label.innerText = "Статус:";
                name.innerText = "Коктейл и разговори";
                timer.innerText = "ФИНАЛ";
                next.innerText = "Благодарим ви, че бяхте с нас!";
            }
            
            // Показваме страницата, след като всичко е изчислено
            document.body.style.opacity = "1";
        }

        function format(ms) {
            const h = Math.floor(ms / 3600000);
            const m = Math.floor((ms % 3600000) / 60000);
            const s = Math.floor((ms % 60000) / 1000);
            return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        // Стартираме веднага
        update();
        setInterval(update, 1000);
    </script>
</body>
</html>
