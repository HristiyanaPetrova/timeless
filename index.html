<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEM Център - В. Търново</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-blue: #0f172a;
            --highlight: #00d4ff;
            --success: #5eead4;
            --white: #ffffff;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #0f172a; /* Солиден цвят за начало, за да няма бял екран */
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: var(--white);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid var(--highlight); width: 100%; max-width: 600px; }
        
        .status-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            width: 90%;
            max-width: 600px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #timer {
            font-size: 3.5rem;
            font-weight: bold;
            text-shadow: 0 0 10px var(--highlight);
            margin: 10px 0;
        }

        .current-name { font-size: 1.5rem; color: var(--success); font-weight: bold; }

        .schedule { margin-top: 30px; width: 90%; max-width: 600px; }

        .event-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
        }

        .active { 
            background: rgba(0, 212, 255, 0.2) !important; 
            border: 1px solid var(--highlight);
            transform: scale(1.02);
        }

        .past { opacity: 0.3; }

        @media (max-width: 480px) { #timer { font-size: 2.5rem; } }
    </style>
</head>
<body>

    <div class="header">
        <h1>🚀 STEM ЦЕНТЪР 🚀</h1>
        <p>ОУ "Св. Патриарх Евтимий", гр. В. Търново</p>
    </div>

    <div class="status-box">
        <div id="status-label" style="text-transform: uppercase; font-size: 0.8rem;">Зареждане...</div>
        <div id="current-name" class="current-name">Моля, изчакайте</div>
        <div id="timer">00:00:00</div>
        <div id="next-preview" style="font-size: 0.9rem; opacity: 0.8; margin-top: 10px;"></div>
    </div>

    <div class="schedule" id="schedule-list">
        </div>

    <script>
        const program = [
            { id: 0, time: "2026-04-27T13:30:00", label: "Тържествено посрещане", loc: "Фоайе" },
            { id: 1, time: "2026-04-27T13:40:00", label: "Експерименти и симулации", loc: "Етаж 2" },
            { id: 2, time: "2026-04-27T13:50:00", label: "Математическа пекарна", loc: "Етаж 3" },
            { id: 3, time: "2026-04-27T14:00:00", label: "Официално откриване", loc: "Етаж 4" },
            { id: 4, time: "2026-04-27T14:20:00", label: "Зона за Математика", loc: "Етаж 4" },
            { id: 5, time: "2026-04-27T14:30:00", label: "Зона за Биология", loc: "Етаж 4" },
            { id: 6, time: "2026-04-27T14:40:00", label: "Зона за Химия", loc: "Етаж 4" },
            { id: 7, time: "2026-04-27T14:50:00", label: "Урок: Физика на 360°", loc: "Етаж 4" },
            { id: 8, time: "2026-04-27T15:30:00", label: "Коктейл", loc: "Етаж 2" }
        ];

        function renderSchedule() {
            const container = document.getElementById('schedule-list');
            container.innerHTML = program.map(ev => `
                <div class="event-item" id="item-${ev.id}">
                    <span><b>${ev.time.split('T')[1].substring(0,5)}</b> - ${ev.label}</span>
                    <span style="opacity:0.6">${ev.loc}</span>
                </div>
            `).join('');
        }

        function update() {
            const now = new Date().getTime();
            let currentIdx = -1;

            program.forEach((ev, i) => {
                const evTime = new Date(ev.time).getTime();
                const el = document.getElementById('item-' + i);
                if (el) {
                    el.classList.remove('active', 'past');
                    if (now >= evTime) {
                        currentIdx = i;
                        el.classList.add('past');
                    }
                }
            });

            if (currentIdx !== -1) {
                const activeEl = document.getElementById('item-' + currentIdx);
                if (activeEl) activeEl.className = 'event-item active';
            }

            const label = document.getElementById('status-label');
            const name = document.getElementById('current-name');
            const timer = document.getElementById('timer');
            const next = document.getElementById('next-preview');

            if (currentIdx === -1) {
                label.innerText = "До началото остават:";
                name.innerText = "Добре дошли!";
                const diff = new Date(program[0].time).getTime() - now;
                timer.innerText = formatTime(diff);
                next.innerText = "Начало: " + program[0].label;
            } else if (currentIdx < program.length - 1) {
                label.innerText = "В МОМЕНТА:";
                name.innerText = program[currentIdx].label;
                const diff = new Date(program[currentIdx+1].time).getTime() - now;
                timer.innerText = formatTime(diff);
                next.innerHTML = "Следва: " + program[currentIdx+1].label;
            } else {
                label.innerText = "Статус:";
                name.innerText = "Коктейл";
                timer.innerText = "ФИНАЛ";
                next.innerText = "Благодарим ви!";
            }
        }

        function formatTime(ms) {
            const h = Math.floor(ms / 3600000);
            const m = Math.floor((ms % 3600000) / 60000);
            const s = Math.floor((ms % 60000) / 1000);
            return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        // Изпълняваме веднага
        renderSchedule();
        update();
        setInterval(update, 1000);
    </script>
</body>
</html>
